# Cloud Agent Task Dispatch — Guided AI Labs Agentic OS CNS
# Version: 1.0
# Last Updated: 2026-06-26
#
# This is the machine-readable entry point for cloud agents.
# Agents read this file to find available tasks, then read chunk_spec_ref for full details.
#
# Task statuses:
#   available        - unclaimed, ready to start
#   claimed          - agent created the feature branch (branch name is the lock)
#   ready-for-review - PR opened, waiting for Adam to review
#   complete         - PR merged, done
#   blocked          - cannot proceed (see notes)
#   coordinated      - requires human or cross-machine coordination before starting
#
# Platform tags:
#   cloud-safe       - GitHub MCP only, no local execution needed
#   windows-local    - requires Windows machine for test execution or runtime validation
#   linux-local      - requires Linux machine (Graphify CLI, FastAPI server, etc.)
#   coordinated      - requires cross-machine or human coordination

project: agentic-multi-agent-agent-builder
github_org: Adamgdwn
control_repo: Adamgdwn/agentic-multi-agent-agent-builder

branch_strategy: feature-branch-only
merge_strategy: pr-then-adam-reviews
never_push_to:
  - main
  - master

branch_naming: "cloud/{task_id}-{short-slug}"
pr_title_format: "[CNS Task {task_id}] {title}"
pr_dispatch_update: "Always update this file in your PR — set status, branch, pr_url"

startup_doc: docs/cloud-agent-startup.md
chunk_specs_phase0: "docs/build-control/2026-06-26 - phase-0-chunk-specs.md"
chunk_specs_phase1: "docs/build-control/2026-06-25 - phase-1-chunk-specs.md"

