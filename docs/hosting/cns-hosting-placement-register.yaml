components:

  - component: gail-os-api
    repo: gail-ai-operating-system-rev-2
    path: apps/gail-os-api
    current_runtime: local (Windows uvicorn, port 8123; Linux port 8124 for CTP)
    pilot_runtime: Azure Container Apps — Canada Central
    target_runtime: Azure Container Apps — Canada Central (re-deploy to business sub when available)
    region: canadacentral
    data_owner: Guided AI Labs (internal)
    secret_owner: Azure Key Vault (rg-gail-cns-pilot-canadacentral)
    network_exposure: public HTTPS via ACA ingress; GAIL_OS_API_KEY required on all routes
    auth_model: API key (GAIL_OS_API_KEY env var; never hardcoded or committed)
    budget_cap: $25/month (ACA consumption)
    scale_rule: min_replicas=0, max_replicas=2, HTTP concurrency trigger
    backup_policy: Evidence store is idempotent JSON; re-creatable from mission log
    promotion_gate: Adam explicit approval for Azure resource creation (H1 gate)
    rollback_path: >
      az containerapp update --name aca-gail-os-api
      --revision-weight previous=100 current=0;
      or: az group delete to remove all pilot resources

  - component: graphify-cns-api
    repo: graphify-workspace-cockpit
    path: root (FastAPI app)
    current_runtime: local (Linux uvicorn, port 8001)
    pilot_runtime: Azure Container Apps — Canada Central
    target_runtime: Azure Container Apps — Canada Central (re-deploy to business sub when available)
    region: canadacentral
    data_owner: Guided AI Labs (internal)
    secret_owner: Azure Key Vault (rg-gail-cns-pilot-canadacentral)
    network_exposure: public HTTPS via ACA ingress; CNS_API_KEY required
    auth_model: API key (CNS_API_KEY env var; never hardcoded or committed)
    budget_cap: $15/month (ACA consumption)
    scale_rule: min_replicas=0, max_replicas=1 (single-writer SQLite constraint)
    persistence: Azure Files share (LRS standard); mounted at /app/data/cns.db
    backup_policy: >
      Daily azcopy snapshot of Azure Files share to cool storage.
      SQLite WAL mode enabled; consistent copy safe with azcopy.
    promotion_gate: Adam explicit approval for Azure resource creation (H1 gate)
    rollback_path: >
      az containerapp update --name aca-graphify-cns-api
      --revision-weight previous=100 current=0;
      Azure Files share preserves state across rollback

